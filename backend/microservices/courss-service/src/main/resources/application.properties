# Service name (must match Gateway lb://)
spring.application.name=course-service

# Server port
server.port=8081
server.servlet.context-path=/PIproject

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/PI?useUnicode=true&useJDBCCompliantTimezoneShift=true&createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT - must match user-service secret so course-service can validate teacher tokens
jwt.secret=LinguaNovaUserServiceJwtSecretKey2025Min32Chars
jwt.expiration=3600000
app.course.dev-mode=true

# Stripe (optional). If set, "Deploy Access" uses Stripe Checkout; otherwise enrollment is direct.
stripe.secret-key=

# Eureka - disabled when running standalone
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=localhost:${spring.application.name}:${server.port}