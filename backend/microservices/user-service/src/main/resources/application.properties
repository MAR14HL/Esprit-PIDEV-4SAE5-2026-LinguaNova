spring.application.name=user-service

server.port=8082
# No context path so proxy can forward /PIproject -> 8082 and pathRewrite strips /PIproject
server.servlet.context-path=


# Database
spring.datasource.url=jdbc:mysql://localhost:3306/PI?useUnicode=true&useJDBCCompliantTimezoneShift=true&createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Eureka - disabled when running standalone (no Eureka server on 8761)
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=localhost:${spring.application.name}:${server.port}